name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        type: choice
        options: [preview, development]
        default: preview

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-android@v3

      - run: npm ci

      - name: Build APK
        run: npx eas build --platform android --profile ${{ inputs.profile || 'preview' }} --local --output build.apk

      - uses: actions/upload-artifact@v4
        with:
          name: pickup-${{ inputs.profile || 'preview' }}
          path: build.apk
