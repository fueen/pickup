<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickUp Logo · 最终版</title>
<style>
  :root { --bg: #000; --accent: #FFCC00; --surface: #1C1C1E; }
  body {
    background: var(--bg); color: #fff;
    font-family: -apple-system, 'PingFang SC', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px;
  }
  h2 { font-family: Georgia, serif; letter-spacing: 8px; margin-bottom: 32px; }
  .previews { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
  .preview-card {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .preview-card span { font-size: 13px; color: #8E8E93; letter-spacing: 2px; }
  .icon-bg {
    width: 180px; height: 180px;
    border-radius: 42px;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .icon-sm {
    width: 80px; height: 80px;
    border-radius: 20px;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .btn-row { margin-top: 40px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .btn {
    padding: 14px 40px; border-radius: 30px;
    font-size: 14px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; border: none; font-family: inherit;
    transition: all 0.2s; text-transform: uppercase;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #FFD740; transform: scale(1.03); }
  .btn-ghost { background: transparent; color: #8E8E93; border: 1px solid rgba(255,255,255,0.15); }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
  #status { margin-top: 20px; color: var(--accent); font-size: 13px; }
</style>
</head>
<body>

<h2>PICKUP LOGO</h2>

<div class="previews">
  <div class="preview-card">
    <div class="icon-bg">
      <svg id="main-svg" width="120" height="120" viewBox="0 0 64 64">
        <rect x="6" y="10" width="36" height="44" rx="6" fill="#1A1A1A" transform="rotate(-8 24 32)"/>
        <rect x="10" y="8" width="38" height="44" rx="6" fill="#2C2C2E" transform="rotate(-4 29 30)"/>
        <rect x="14" y="6" width="40" height="44" rx="7" fill="none" stroke="#FFCC00" stroke-width="2.8"/>
        <circle cx="34" cy="26" r="5" fill="#FFCC00" opacity="0.3"/>
      </svg>
    </div>
    <span>APP ICON · 180px</span>
  </div>

  <div class="preview-card">
    <div class="icon-sm">
      <svg width="52" height="52" viewBox="0 0 64 64">
        <rect x="6" y="10" width="36" height="44" rx="6" fill="#1A1A1A" transform="rotate(-8 24 32)"/>
        <rect x="10" y="8" width="38" height="44" rx="6" fill="#2C2C2E" transform="rotate(-4 29 30)"/>
        <rect x="14" y="6" width="40" height="44" rx="7" fill="none" stroke="#FFCC00" stroke-width="2.8"/>
        <circle cx="34" cy="26" r="5" fill="#FFCC00" opacity="0.3"/>
      </svg>
    </div>
    <span>NOTIFICATION · 80px</span>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-ghost" onclick="downloadPNG(1024)">下载 1024×1024 PNG</button>
  <button class="btn btn-primary" onclick="downloadPNG(1024)">导出 App Icon</button>
</div>
<p id="status"></p>

<canvas id="canvas" width="1024" height="1024" style="display:none"></canvas>

<script>
function downloadPNG(size) {
  const canvas = document.getElementById('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  const r = size * 0.225; // ~42/180 rounded corner on 180px maps to ~23% of size
  const rr = size * 0.23;
  ctx.roundRect(0, 0, size, size, rr);
  ctx.fill();

  const svg = document.getElementById('main-svg');
  const svgData = new XMLSerializer().serializeToString(svg);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    const pad = size * 0.15;
    const imgSize = size - pad * 2;
    ctx.drawImage(img, pad, pad, imgSize, imgSize);
    URL.revokeObjectURL(url);

    canvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'pickup-icon-' + size + '.png';
      a.click();
      document.getElementById('status').textContent = '✅ PNG 已下载！放到 assets/icon.png 即可';
    }, 'image/png');
  };
  img.src = url;
}
</script>
</body>
</html>
