<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相册图标选择 — PickUp</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
<style>
  :root {
    --bg: #000000;
    --surface: #1C1C1E;
    --accent: #FFCC00;
    --muted: #8E8E93;
    --text: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', 'PingFang SC', -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 4px;
    margin-bottom: 8px;
    color: var(--text);
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 48px;
    text-align: center;
    letter-spacing: 1px;
  }
  .note {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 40px;
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 680px;
    width: 100%;
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  .card {
    background: var(--surface);
    border-radius: 16px;
    padding: 24px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,204,0,0.06) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255,204,0,0.1);
  }
  .card:hover::after { opacity: 1; }
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(255,204,0,0.25), 0 8px 24px rgba(255,204,0,0.15);
  }
  .card.selected::before {
    content: '✓';
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--bg);
    background: var(--accent);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  .icon-preview {
    position: relative;
    z-index: 1;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card:hover .icon-preview {
    background: rgba(255,204,0,0.12);
    transform: scale(1.08);
  }
  .icon-preview .mdi {
    font-size: 26px;
    color: var(--muted);
    transition: color 0.25s ease;
  }
  .card:hover .icon-preview .mdi {
    color: var(--accent);
  }
  .card.selected .icon-preview .mdi {
    color: var(--accent);
  }
  .label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    transition: color 0.25s ease;
    position: relative;
    z-index: 1;
  }
  .card:hover .label { color: var(--accent); }
  .card.selected .label { color: var(--accent); }
  .icon-name {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    position: relative;
    z-index: 1;
    text-align: center;
    word-break: break-all;
  }
  .btn-row {
    margin-top: 40px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    padding: 12px 32px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover {
    background: #FFD633;
    transform: scale(1.04);
  }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.4);
    color: var(--text);
  }
  .selected-info {
    margin-top: 16px;
    font-size: 13px;
    color: var(--accent);
    min-height: 20px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<h1>PICKUP</h1>
<p class="subtitle">相册图标选择 · 点击卡片预览选中效果</p>

<div class="note">
  💡 当前使用图标：<strong style="color:#FFCC00">folder-image</strong>（左上角第 1 行第 1 个）。<br>
  点击下方卡片选中，查看金色选中态效果。选中你最喜欢的，告诉我图标名称。
</div>

<div class="grid" id="grid"></div>

<p id="selectedLabel" class="selected-info"></p>

<div class="btn-row">
  <button class="btn btn-primary" onclick="confirmPick()">确认选择</button>
  <button class="btn btn-ghost" onclick="resetAll()">清除选择</button>
</div>

<script>
const ICONS = [
  { name: 'folder-image',        label: '文件夹·图片'},
  { name: 'image-multiple',      label: '多图'},
  { name: 'image-album',         label: '相册'},
  { name: 'view-gallery',        label: '画廊浏览'},
  { name: 'view-grid',           label: '网格视图'},
  { name: 'apps',                label: '应用中心'},
  { name: 'collage',             label: '拼贴'},
  { name: 'dots-grid',           label: '点阵'},
  { name: 'animation',           label: '幻灯片'},
  { name: 'wallpaper',           label: '壁纸'},
  { name: 'camera-burst',        label: '连拍'},
  { name: 'layers',              label: '图层'},
];

let selected = null;

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = ICONS.map((icon, i) => `
    <div class="card${selected === i ? ' selected' : ''}" onclick="select(${i})" title="mdi-${icon.name}">
      <div class="icon-preview">
        <span class="mdi mdi-${icon.name}"></span>
      </div>
      <span class="label">${icon.label}</span>
      <span class="icon-name">mdi-${icon.name}</span>
    </div>
  `).join('');
}

function select(i) {
  selected = i;
  const icon = ICONS[i];
  document.getElementById('selectedLabel').textContent =
    `已选中：${icon.label}  (MaterialCommunityIcons: "${icon.name}")`;
  render();
}

function resetAll() {
  selected = null;
  document.getElementById('selectedLabel').textContent = '';
  render();
}

function confirmPick() {
  if (selected == null) { alert('请先选择一个图标'); return; }
  const icon = ICONS[selected];
  document.getElementById('selectedLabel').textContent =
    `✅ 已确认！在代码中使用：MaterialCommunityIcons name="${icon.name}"`;
}

render();
</script>
</body>
</html>
