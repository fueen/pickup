<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickUp Logo 选择</title>
<style>
  :root {
    --bg: #000000;
    --surface: #111111;
    --card: #1A1A1A;
    --accent: #FFCC00;
    --accent-dim: rgba(255,204,0,0.09);
    --muted: #8E8E93;
    --text: #FFFFFF;
    --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @font-face {
    font-family: 'Display';
    src: local('Georgia'), local('Times New Roman');
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 64px 24px 80px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(255,204,0,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(255,204,0,0.02) 0%, transparent 50%);
  }
  .brand {
    text-align: center; margin-bottom: 8px;
    font-family: 'Display', Georgia, 'Times New Roman', serif;
    font-size: 40px; font-weight: 700; letter-spacing: 10px;
    color: var(--text);
    text-transform: uppercase;
  }
  .tagline {
    text-align: center; font-size: 13px; color: var(--muted);
    letter-spacing: 4px; margin-bottom: 8px;
  }
  .note {
    font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 52px;
    padding: 8px 20px; border: 1px solid var(--border);
    border-radius: 20px; background: rgba(255,255,255,0.02);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 820px; width: 100%;
  }
  @media (max-width: 680px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--card);
    border: 2px solid transparent;
    border-radius: 24px;
    padding: 28px 20px 20px;
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 30%, var(--accent-dim) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.4s;
  }
  .card:hover { border-color: rgba(255,204,0,0.25); transform: translateY(-3px); }
  .card:hover::before { opacity: 1; }
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,204,0,0.15), 0 12px 32px rgba(255,204,0,0.1);
  }
  .card.selected::after {
    content: '✓'; position: absolute; top: 14px; right: 16px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: #000; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }
  .icon-wrap {
    position: relative; z-index: 1;
    width: 100px; height: 100px;
    border-radius: 24px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 18px;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.35s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .card:hover .icon-wrap { transform: scale(1.04); box-shadow: 0 8px 32px rgba(255,204,0,0.08); }
  .card.selected .icon-wrap { box-shadow: 0 0 0 2px rgba(255,204,0,0.3), 0 8px 32px rgba(255,204,0,0.1); }
  .icon-wrap svg { width: 64px; height: 64px; }
  .name {
    font-size: 15px; font-weight: 700; color: var(--text);
    letter-spacing: 2px; margin-bottom: 4px; position: relative; z-index: 1;
    transition: color 0.3s;
  }
  .card:hover .name, .card.selected .name { color: var(--accent); }
  .desc {
    font-size: 12px; color: var(--muted); text-align: center;
    line-height: 1.5; position: relative; z-index: 1;
  }
  .status-bar {
    margin-top: 44px; display: flex; gap: 16px; align-items: center;
    flex-wrap: wrap; justify-content: center;
  }
  .selected-name {
    font-size: 14px; color: var(--accent); min-height: 20px;
    font-weight: 600; letter-spacing: 1px;
  }
  .btn {
    padding: 13px 36px; border-radius: 28px;
    font-size: 14px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; border: none; font-family: inherit;
    transition: all 0.25s ease; text-transform: uppercase;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #FFD740; transform: scale(1.03); }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: var(--text); }
  .shape-gold { fill: var(--accent); }
  .shape-white { fill: #FFFFFF; }
  .shape-muted { fill: #8E8E93; }
  .stroke-gold { stroke: var(--accent); fill: none; }
  .stroke-white { stroke: #FFFFFF; fill: none; }
  .stroke-muted { stroke: #8E8E93; fill: none; }
</style>
</head>
<body>

<div class="brand">PICKUP</div>
<p class="tagline">LOGO · ICON · DESIGN</p>
<div class="note">点击卡片选中，选中你最喜欢的图标方案</div>

<div class="grid" id="grid"></div>

<div class="status-bar">
  <button class="btn btn-ghost" onclick="resetAll()">清除选择</button>
  <span id="selectedLabel" class="selected-name"></span>
  <button class="btn btn-primary" onclick="confirmPick()">确认选择</button>
</div>

<script>
const ICONS = [
  {
    id: 'folders',
    name: '层叠相册',
    desc: '多层文件夹堆叠，金色星芒点缀，象征整理与收纳',
    svg: `<svg viewBox="0 0 64 64"><rect x="6" y="26" width="52" height="34" rx="5" fill="#333"/><rect x="10" y="18" width="48" height="34" rx="5" fill="#555"/><rect x="14" y="10" width="44" height="34" rx="5" fill="#999"/><path d="M48 14l-4-8H20l-4 8" fill="#FFCC00" opacity="0.9"/><circle cx="48" cy="8" r="3" fill="#FFCC00"/><line x1="48" y1="2" x2="48" y2="5" stroke="#FFCC00" stroke-width="1.5"/><line x1="48" y1="11" x2="48" y2="14" stroke="#FFCC00" stroke-width="1.5"/><line x1="42" y1="8" x2="45" y2="8" stroke="#FFCC00" stroke-width="1.5"/><line x1="51" y1="8" x2="54" y2="8" stroke="#FFCC00" stroke-width="1.5"/></svg>`
  },
  {
    id: 'swipe',
    name: '滑动精选',
    desc: '卡片+上下滑动手势箭头，体现核心交互——滑动整理',
    svg: `<svg viewBox="0 0 64 64"><rect x="16" y="12" width="32" height="40" rx="6" fill="#FFCC00" opacity="0.15"/><rect x="18" y="14" width="28" height="36" rx="4" fill="#FFCC00" opacity="0.3"/><rect x="20" y="16" width="24" height="32" rx="3" fill="#1A1A1A" stroke="#FFCC00" stroke-width="1.5"/><circle cx="32" cy="32" r="4" fill="#FFCC00"/><path d="M32 10v6" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/><polygon points="28,14 32,6 36,14" fill="#FFCC00"/><path d="M32 54v-6" stroke="#8E8E93" stroke-width="2.5" stroke-linecap="round"/><polygon points="28,50 32,58 36,50" fill="#8E8E93"/></svg>`
  },
  {
    id: 'lens',
    name: '镜头光圈',
    desc: '相机快门叶片抽象化，几何线条构成动态光圈',
    svg: `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="28" fill="none" stroke="#FFCC00" stroke-width="2"/><circle cx="32" cy="32" r="22" fill="none" stroke="#FFCC00" stroke-width="1" opacity="0.5"/><circle cx="32" cy="32" r="8" fill="#FFCC00"/><circle cx="32" cy="32" r="4" fill="#000"/><polygon points="32,10 36,18 32,22 28,18" fill="#FFCC00" opacity="0.8"/><polygon points="54,32 46,36 42,32 46,28" fill="#FFCC00" opacity="0.8"/><polygon points="32,54 28,46 32,42 36,46" fill="#FFCC00" opacity="0.6"/><polygon points="10,32 18,28 22,32 18,36" fill="#FFCC00" opacity="0.6"/></svg>`
  },
  {
    id: 'stack',
    name: '照片叠层',
    desc: '三张照片错位堆叠，顶部金色高亮，底部展示深度',
    svg: `<svg viewBox="0 0 64 64"><rect x="12" y="14" width="40" height="36" rx="4" fill="#333" transform="rotate(-6 32 32)"/><rect x="14" y="16" width="40" height="36" rx="4" fill="#555" transform="rotate(3 34 34)"/><rect x="11" y="12" width="42" height="38" rx="5" fill="none" stroke="#FFCC00" stroke-width="2"/><circle cx="32" cy="28" r="8" fill="#FFCC00" opacity="0.9"/><path d="M22 54l20-30" stroke="#FFCC00" stroke-width="1.5" opacity="0.4"/></svg>`
  },
  {
    id: 'check',
    name: '精选画框',
    desc: '照片边框+金色勾选，象征精心筛选与整理',
    svg: `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5"/><rect x="10" y="12" width="44" height="40" rx="4" fill="none" stroke="#8E8E93" stroke-width="0.8"/><circle cx="48" cy="50" r="12" fill="#FFCC00"/><path d="M43 50l3.5 3.5L54 46" stroke="#000" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><line x1="6" y1="32" x2="58" y2="32" stroke="#8E8E93" stroke-width="0.5" opacity="0.3"/></svg>`
  },
  {
    id: 'abstract-p',
    name: '抽象 P 标',
    desc: '字母 P 由光圈叶片和取景框元素构成，品牌感强',
    svg: `<svg viewBox="0 0 64 64"><rect x="6" y="6" width="52" height="52" rx="12" fill="none" stroke="#FFCC00" stroke-width="3"/><path d="M22 16v32M22 16h14c8 0 14-7 14-16S44 0 36 0H16" fill="none" stroke="#FFCC00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(4,16)"/><circle cx="50" cy="14" r="3" fill="#FFCC00" opacity="0.6"/></svg>`
  }
];

let selected = null;

function render() {
  document.getElementById('grid').innerHTML = ICONS.map((icon, i) => `
    <div class="card${selected === i ? ' selected' : ''}" onclick="select(${i})">
      <div class="icon-wrap">${icon.svg}</div>
      <span class="name">${icon.name}</span>
      <span class="desc">${icon.desc}</span>
    </div>
  `).join('');
}

function select(i) {
  selected = i;
  document.getElementById('selectedLabel').textContent = '已选中：' + ICONS[i].name;
  render();
}

function resetAll() {
  selected = null;
  document.getElementById('selectedLabel').textContent = '';
  render();
}

function confirmPick() {
  if (selected == null) { alert('请先选择一个图标方案'); return; }
  document.getElementById('selectedLabel').textContent = '✅ 已确认：' + ICONS[selected].name + ' — 开始制作 LOGO';
}

render();
</script>
</body>
</html>
