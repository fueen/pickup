<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickUp Logo 选择 · Round 2</title>
<style>
  :root {
    --bg: #000; --surface: #111; --card: #1A1A1A;
    --accent: #FFCC00; --accent-dim: rgba(255,204,0,0.07);
    --muted: #8E8E93; --text: #FFF; --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 64px 24px 80px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(255,204,0,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(255,204,0,0.02) 0%, transparent 50%);
  }
  .brand {
    text-align: center; margin-bottom: 4px;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 38px; font-weight: 700; letter-spacing: 12px;
    text-transform: uppercase;
  }
  .tagline {
    text-align: center; font-size: 12px; color: var(--muted);
    letter-spacing: 6px; margin-bottom: 48px; text-transform: uppercase;
  }
  .section-title {
    font-size: 13px; font-weight: 700; letter-spacing: 4px;
    color: var(--accent); margin: 36px 0 20px; text-align: center;
    text-transform: uppercase;
  }
  .section-title:first-of-type { margin-top: 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 820px; width: 100%;
  }
  @media (max-width: 680px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--card); border: 2px solid transparent;
    border-radius: 24px; padding: 24px 18px 18px;
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; position: relative; overflow: hidden;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 30%, var(--accent-dim) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.4s;
  }
  .card:hover { border-color: rgba(255,204,0,0.25); transform: translateY(-3px); }
  .card:hover::before { opacity: 1; }
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,204,0,0.15), 0 12px 32px rgba(255,204,0,0.1);
  }
  .card.selected::after {
    content: '✓'; position: absolute; top: 12px; right: 14px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--accent); color: #000; font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }
  .icon-wrap {
    position: relative; z-index: 1;
    width: 108px; height: 108px;
    border-radius: 26px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    transition: transform 0.35s, box-shadow 0.35s;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  }
  .card:hover .icon-wrap { transform: scale(1.03); box-shadow: 0 8px 32px rgba(255,204,0,0.06); }
  .card.selected .icon-wrap { box-shadow: 0 0 0 2px rgba(255,204,0,0.25), 0 8px 32px rgba(255,204,0,0.08); }
  .name {
    font-size: 14px; font-weight: 700; color: var(--text);
    letter-spacing: 2px; margin-bottom: 4px; position: relative; z-index: 1;
    transition: color 0.3s;
  }
  .card:hover .name, .card.selected .name { color: var(--accent); }
  .desc {
    font-size: 11px; color: var(--muted); text-align: center;
    line-height: 1.5; position: relative; z-index: 1;
  }
  .status-bar {
    margin-top: 48px; display: flex; gap: 16px; align-items: center;
    flex-wrap: wrap; justify-content: center;
  }
  .selected-name { font-size: 14px; color: var(--accent); min-height: 20px; font-weight: 600; letter-spacing: 1px; }
  .btn {
    padding: 13px 36px; border-radius: 28px;
    font-size: 14px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; border: none; font-family: inherit;
    transition: all 0.25s ease; text-transform: uppercase;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #FFD740; transform: scale(1.03); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.15); }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); color: var(--text); }
</style>
</head>
<body>

<div class="brand">PICKUP</div>
<p class="tagline">Logo Concepts · Round 2</p>

<h3 class="section-title">— 滑动交互 —</h3>
<div class="grid" id="grid-swipe"></div>

<h3 class="section-title">— 艺术字标 —</h3>
<div class="grid" id="grid-type"></div>

<div class="status-bar">
  <button class="btn btn-ghost" onclick="resetAll()">清除选择</button>
  <span id="selectedLabel" class="selected-name"></span>
  <button class="btn btn-primary" onclick="confirmPick()">确认选择</button>
</div>

<script>
const SWIPE_ICONS = [
  {
    id: 'swipe-card-lr',
    name: '左右滑动卡片',
    desc: '照片卡片居中，左右双向箭头+金色轨迹线，表达滑动挑选动作',
    svg: `<svg viewBox="0 0 64 64"><rect x="16" y="12" width="32" height="44" rx="6" fill="#1A1A1A" stroke="#FFCC00" stroke-width="2.5"/><path d="M18 34h28" stroke="#8E8E93" stroke-width="0.5"/><line x1="10" y1="34" x2="48" y2="34" stroke="#FFCC00" stroke-width="2" stroke-dasharray="3 2"/><polygon points="8,34 16,28 16,40" fill="#FFCC00"/><polygon points="56,34 48,28 48,40" fill="#8E8E93"/><circle cx="32" cy="24" r="5" fill="#FFCC00" opacity="0.3"/></svg>`
  },
  {
    id: 'swipe-stack',
    name: '堆叠滑出',
    desc: '三张卡片错位右滑，最前一张金色高亮，表达逐张筛选',
    svg: `<svg viewBox="0 0 64 64"><rect x="6" y="10" width="36" height="44" rx="5" fill="#222" transform="rotate(-8 24 32)"/><rect x="10" y="8" width="38" height="44" rx="5" fill="#444" transform="rotate(-4 29 30)"/><rect x="14" y="6" width="40" height="44" rx="6" fill="none" stroke="#FFCC00" stroke-width="2.5"/><path d="M54 28l8-4v16l-8-4" fill="#FFCC00" opacity="0.8"/><circle cx="34" cy="26" r="6" fill="#FFCC00" opacity="0.25"/></svg>`
  },
  {
    id: 'swipe-arrow-card',
    name: '扫掠卡片',
    desc: '单张卡片+贯穿的金色扫掠弧线箭头，简洁有力',
    svg: `<svg viewBox="0 0 64 64"><rect x="18" y="14" width="28" height="40" rx="7" fill="#1A1A1A" stroke="#8E8E93" stroke-width="1.8"/><path d="M56 52C56 52 46 28 28 12" stroke="#FFCC00" stroke-width="3" fill="none" stroke-linecap="round"/><polygon points="26,14 32,8 30,16" fill="#FFCC00"/><circle cx="32" cy="34" r="4" fill="#FFCC00" opacity="0.25"/></svg>`
  },
  {
    id: 'swipe-dual-photo',
    name: '双图选择',
    desc: '两张照片左右并排，一张金框(保留)一张灰框(删除)，中间分隔线',
    svg: `<svg viewBox="0 0 64 64"><rect x="4" y="10" width="26" height="44" rx="5" fill="none" stroke="#FFCC00" stroke-width="2.5"/><path d="M17 38l6-14-6-10" fill="none" stroke="#FFCC00" stroke-width="1.5" opacity="0.4"/><rect x="34" y="16" width="26" height="38" rx="5" fill="none" stroke="#8E8E93" stroke-width="1.5" opacity="0.6"/><line x1="32" y1="6" x2="32" y2="60" stroke="#FFCC00" stroke-width="1" stroke-dasharray="2 3" opacity="0.4"/><polygon points="30,14 34,8 30,10" fill="#FFCC00" opacity="0.6"/></svg>`
  },
];

const TYPE_ICONS = [
  {
    id: 'type-p-shutter',
    name: 'P · 快门',
    desc: '字母 P 的竖笔与弧线由相机快门叶片构成，几何硬朗',
    svg: `<svg viewBox="0 0 64 64"><rect x="12" y="4" width="40" height="56" rx="10" fill="none" stroke="#FFCC00" stroke-width="3"/><path d="M28 14v36M28 14h12c10 0 16-8 16-18S50 14 40 14" fill="none" stroke="#FFCC00" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="28" cy="32" r="2" fill="#FFCC00"/></svg>`
  },
  {
    id: 'type-pick-bold',
    name: 'PICK 粗体',
    desc: '粗体无衬线 PICK 字样，K 的斜线延伸出金色扫尾',
    svg: `<svg viewBox="0 0 64 64"><text x="8" y="52" font-family="Georgia,serif" font-size="42" font-weight="900" fill="#FFFFFF" letter-spacing="-2">PICK</text><path d="M58 26l6 4-6 4" fill="#FFCC00" opacity="0.8"/><rect x="8" y="54" width="54" height="2" rx="1" fill="#FFCC00" opacity="0.6"/></svg>`
  },
  {
    id: 'type-p-minimal',
    name: '极简 P',
    desc: '极致简约的单字母 P，半开口弧线+竖线，留白艺术',
    svg: `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="none" stroke="#FFCC00" stroke-width="3.5"/><path d="M26 18v28M26 18h10c10 0 14 6 14 14S46 46 36 46H26" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
  },
  {
    id: 'type-up-arrow',
    name: 'Pick↑ 动作',
    desc: 'PICK 字样 + UP 上方升起金色箭头，呼应 PickUp 品牌名',
    svg: `<svg viewBox="0 0 64 64"><text x="14" y="52" font-family="Georgia,serif" font-size="34" font-weight="900" fill="#FFFFFF" letter-spacing="0">PICK</text><path d="M42 20l6-12 6 12" fill="#FFCC00"/><path d="M48 8v24" stroke="#FFCC00" stroke-width="2.5" stroke-linecap="round"/><path d="M42 28l6 4 6-4" stroke="#FFCC00" stroke-width="1.5" fill="none"/></svg>`
  },
];

let selected = null;
let allIcons = [...SWIPE_ICONS, ...TYPE_ICONS];

function render() {
  document.getElementById('grid-swipe').innerHTML = SWIPE_ICONS.map((icon, i) => renderCard(icon, i)).join('');
  document.getElementById('grid-type').innerHTML = TYPE_ICONS.map((icon, i) => renderCard(icon, i + SWIPE_ICONS.length)).join('');
}

function renderCard(icon, globalIdx) {
  const sel = selected === globalIdx ? ' selected' : '';
  return `<div class="card${sel}" onclick="select(${globalIdx})">
    <div class="icon-wrap">${icon.svg}</div>
    <span class="name">${icon.name}</span>
    <span class="desc">${icon.desc}</span>
  </div>`;
}

function select(i) {
  selected = i;
  document.getElementById('selectedLabel').textContent = '已选中：' + allIcons[i].name;
  render();
}

function resetAll() {
  selected = null;
  document.getElementById('selectedLabel').textContent = '';
  render();
}

function confirmPick() {
  if (selected == null) { alert('请先选择一个图标'); return; }
  document.getElementById('selectedLabel').textContent = '✅ 已确认：' + allIcons[selected].name;
}

render();
</script>
</body>
</html>
